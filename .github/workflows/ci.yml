name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ------------------------------------------------------------------
  # Lint & Format (fast feedback)
  # ------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Upgrade build toolchain
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Lint with Ruff
        run: ruff check --output-format=github gigacode/ tests/

      - name: Check formatting with Black
        run: black --check --diff --verbose gigacode/ tests/

  # ------------------------------------------------------------------
  # Type Check
  # ------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Upgrade build toolchain
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Type check with MyPy
        run: mypy gigacode/ --ignore-missing-imports --show-error-codes

  # ------------------------------------------------------------------
  # Build Verification (wheel & sdist)
  # ------------------------------------------------------------------
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Upgrade build toolchain
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build wheel & sdist
        run: python -m build

      - name: Check wheel with Twine
        run: twine check dist/*

      - name: Verify wheel installs
        run: |
          python -m venv .venv-test
          .venv-test/bin/python -m pip install dist/*.whl
          .venv-test/bin/python -c "from gigacode.gigacode_tool import CodeEmbeddingTool; print('OK')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 7

  # ------------------------------------------------------------------
  # Tests (cross-platform, cross-version)
  # ------------------------------------------------------------------
  test:
    name: Test ${{ matrix.os }} / Py${{ matrix.python-version }}
    needs: [lint, typecheck]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            coverage: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Upgrade build toolchain
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Test with pytest
        run: pytest tests/ -v --tb=short --ignore=tests/test_faiss_optimizer.py --ignore=tests/test_gpu_id_integration.py

      - name: Test with coverage
        if: matrix.coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=gigacode --cov-report=xml --cov-report=term \
            --ignore=tests/test_faiss_optimizer.py --ignore=tests/test_gpu_id_integration.py

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run smoke benchmarks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python benchmark.py --dir examplecode/ --search-iters 5 --edit-iters 1 || true

  # ------------------------------------------------------------------
  # Security Scan
  # ------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r gigacode/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
